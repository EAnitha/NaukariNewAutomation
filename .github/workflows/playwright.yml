name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual run
  schedule:
    # Every day at 11:45 PM IST (UTC 18:15)
    #- cron: '15 18 * * *'
    # Monday to Friday at 8:30 AM IST (UTC 03:00)
    - cron: '0 3 * * 1-6'
    # Monday to Friday at 9:30 AM IST (UTC 04:00)
    - cron: '0 4 * * 1-6'
    # Monday to Friday at 3:30 PM IST (UTC 10:00)
    - cron: '0 10 * * 1-6'
    # Every day at 11:35 PM IST (UTC 18:05)
    #- cron: '5 18 * * *'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run stable Playwright tests
      run: npm run test:ci
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
